services:
  talkweaver:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
    command:
      - streamlit
      - run
      - webapp/streamlit_app.py
      - --server.address=0.0.0.0
